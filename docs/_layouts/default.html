<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    
    <!-- SEO -->
    {% seo %}
</head>
<body>
    <div class="page-wrapper">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-container">
                <div class="navbar-brand">
                    <a href="{{ '/' | relative_url }}" class="logo">
                        <img src="{{ '/zabbix-logo.svg' | relative_url }}" alt="Zabbix logo" class="logo-icon">
                        <span class="logo-text">Community Templates</span>
                    </a>
                </div>
                <ul class="navbar-menu">
                    <li><a href="{{ '/' | relative_url }}">All Templates</a></li>
                    <li><a href="{{ '/about.html' | relative_url }}">About</a></li>
                    <li><a href="{{ '/contribute.html' | relative_url }}" class="btn-primary">Contribute</a></li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            {{ content }}
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-container">
                <div class="footer-section">
                    <h4>{{ site.title }}</h4>
                    <p>{{ site.description }}</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="https://github.com/{{ site.repository }}">GitHub Repository</a></li>
                        <li><a href="https://github.com/{{ site.repository }}/issues">Report Issues</a></li>
                        <li><a href="https://github.com/{{ site.repository }}/discussions">Discussions</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Community</h4>
                    <ul>
                        <li><a href="https://zabbix.com">Zabbix Official</a></li>
                        <li><a href="https://www.zabbix.com/documentation">Documentation</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Zabbix Community. Licensed under MIT.</p>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
