<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zabbix Community Templates Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Zabbix Integration Directory</h1>
    <p>Community-maintained templates for Zabbix Monitoring.</p>
</header>

<main class="container">
    <!-- Example Integration Card -->
    <section class="card">
        <div class="card-header">
            <h2>Cloud: AWS CloudWatch</h2>
            <!-- Dynamic Activity Status Badge -->
            <img src="https://shields.io" alt="Activity Status">
        </div>

        <p>A template for monitoring AWS CloudWatch via Docker Wrapper.</p>

        <div class="tags">
            <span class="tag popular">Popular</span>
            <span class="tag active">Active</span>
        </div>

        <div class="button-group">
            <!-- Link to specific GitHub folder -->
            <a href="https://github.com" class="btn">View Files</a>
            
            <!-- Apply to be maintainer (Opens Issue with Template) -->
            <a href="https://github.com[APP]+AWS+CloudWatch" class="btn secondary">Apply to Maintain</a>
            
            <!-- Report Broken -->
            <a href="https://github.com" class="btn danger">Report Broken</a>
        </div>

        <!-- Rating & Comments Area -->
        <hr>
        <h3>Community Feedback & Ratings</h3>
        <!-- Giscus will load here -->
        <div class="giscus"></div>
    </section>
</main>

<!-- Giscus Integration (Configuration: https://giscus.app) -->
<script src="https://giscus.app"
        data-repo="mgeneralova/community-templates-playground"
        data-repo-id="R_kgDOMO..." 
        data-category="Announcements"
        data-category-id="DIC_kwDOMO..."
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous"
        async>
</script>

</body>
</html>
