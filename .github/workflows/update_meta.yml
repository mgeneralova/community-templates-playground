name: Daily Template Stats Update

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-meta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/workflows/scripts/requirements.txt pyyaml requests

      - name: Update meta.yaml for all templates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python .github/workflows/scripts/update_meta.py

      - name: Commit updated meta.yaml files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add templates/*/meta.yaml
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: daily stats update [skip ci]"
          git push
