name: Label Automation

on:
  issues:
    types: [opened, labeled, unlabeled, closed]
  schedule:
    - cron: "0 3 * * *"  # check stale issues daily

permissions:
  contents: write
  issues: write

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/workflows/scripts/requirements.txt pyyaml requests

      - name: Run label automation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/workflows/scripts/label_automation.py

      - name: Commit meta.yaml changes (maintainer updates)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add templates/*/meta.yaml
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: maintainer update from label automation [skip ci]"
          git push
